
<!DOCTYPE html>
<html>
<head>
    <title>Sales Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="number"] {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        input[type="submit"] {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #00c6ff;
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e6f7ff;
            border-radius: 10px;
            font-size: 18px;
            color: #0077b6;
            font-weight: bold;
        }
.github-link {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #24292e;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
}

.github-link:hover {
    background: #0366d6;
}
    </style>
</head>

<body>
<a href="https://github.com/your-username/your-repo" target="_blank" class="github-link">
    <svg height="20" width="20" viewBox="0 0 16 16" fill="white">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 
        6.53 5.47 7.59.4.07.55-.17.55-.38 
        0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94
        -.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
        -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 
        1.87.87 2.33.66.07-.52.28-.87.51-1.07
        -1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59
        .82-2.15-.08-.2-.36-1.02.08-2.12 0 0 
        .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 
        2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 
        1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07
        -1.87 3.75-3.65 3.95.29.25.54.73.54 
        1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38
        A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    <span>GitHub</span>
</a>
<div class="container">
    <h2>📊 Sales Prediction App</h2>

    <form action="/predict" method="post">
        <input type="number" name="day" placeholder="Enter Day..." required>
        <br>
        <input type="submit" value="Predict">
    </form>

    {% if result %}
    <div class="result">
        💰 Predicted Sales: {{ result }}
    </div>
    {% endif %}
</div>

</body>
</html>
